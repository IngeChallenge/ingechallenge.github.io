<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Koreanisch</title>

<style>
body {
    margin: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background: #f5f5f5;
    font-family: Arial, sans-serif;
}

h1 {
    font-size: 42px;
    margin-bottom: 40px;
    color: #333;
}

button {
    width: 220px;
    height: 220px;
    border: none;
    border-radius: 50%;
    background: #28a745;
    color: white;
    font-size: 80px;
    cursor: pointer;
    box-shadow: 0 6px 15px rgba(0,0,0,0.3);
}

button:active {
    transform: scale(0.96);
}
</style>
</head>

<body>

<h1>Indonesisch</h1>

<button id="playButton">▶</button>

<audio id="audio" src="zahlen.mp3"></audio>

<script>
const audio = document.getElementById("audio");
const button = document.getElementById("playButton");

button.addEventListener("click", () => {
    if (audio.paused) {
        audio.play();
        button.textContent = "⏸";
    } else {
        audio.pause();
        button.textContent = "▶";
    }
});

audio.addEventListener("ended", () => {
    button.textContent = "▶";
});
</script>

</body>
</html>
