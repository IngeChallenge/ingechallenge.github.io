<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Hallo Welt</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink: #fff6ec;
    --ink-dim: #e7d9ce;
    --amber: #ffb454;
    --amber-soft: rgba(255,180,84,0.18);
  }

  *{ box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body{
    margin: 0;
    height: 100%;
  }

  body{
    min-height: 100svh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: max(24px, env(safe-area-inset-top)) 20px max(24px, env(safe-area-inset-bottom));
    font-family: 'Inter', sans-serif;
    color: var(--ink);
    background: radial-gradient(120% 90% at 50% -10%, #3a2a5c 0%, #201338 45%, #150c26 100%);
    overflow: hidden;
    position: relative;
  }

  body::before{
    content: "";
    position: absolute;
    width: 140vw;
    height: 140vw;
    left: 50%;
    bottom: -90vw;
    transform: translateX(-50%);
    background: radial-gradient(circle, rgba(255,148,114,0.25) 0%, rgba(255,148,114,0) 60%);
    pointer-events: none;
  }

  .card{
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 380px;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 28px;
  }

  .eyebrow{
    font-size: 0.72rem;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--amber);
    font-weight: 500;
  }

  h1{
    font-family: 'Fraunces', serif;
    font-optical-sizing: auto;
    font-weight: 600;
    font-size: clamp(2.6rem, 12vw, 3.4rem);
    line-height: 1.05;
    margin: 0;
    letter-spacing: -0.01em;
  }

  p.sub{
    margin: -12px 0 0;
    color: var(--ink-dim);
    font-size: 0.95rem;
    max-width: 26ch;
  }

  .player{
    margin-top: 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
  }

  .ring{
    position: relative;
    width: 128px;
    height: 128px;
  }

  .ring .pulse{
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 1.5px solid var(--amber);
    opacity: 0;
  }

  .ring.playing .pulse{
    animation: pulse 2.2s ease-out infinite;
  }
  .ring.playing .pulse:nth-child(2){ animation-delay: 0.7s; }
  .ring.playing .pulse:nth-child(3){ animation-delay: 1.4s; }

  @keyframes pulse{
    0%   { transform: scale(0.82); opacity: 0.55; }
    100% { transform: scale(1.35); opacity: 0; }
  }

  button.play{
    all: unset;
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: linear-gradient(160deg, #ffcf8c, var(--amber) 70%);
    box-shadow: 0 12px 30px -8px rgba(255,148,60,0.55), inset 0 1px 1px rgba(255,255,255,0.6);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: transform 0.15s ease;
  }
  button.play:active{ transform: scale(0.94); }

  button.play svg{ width: 34px; height: 34px; fill: #2a1608; }
  button.play .icon-pause{ display: none; }
  .ring.playing .icon-play{ display: none; }
  .ring.playing .icon-pause{ display: block; }

  .waveform{
    display: flex;
    align-items: flex-end;
    gap: 4px;
    height: 22px;
  }
  .waveform span{
    width: 3px;
    border-radius: 2px;
    background: var(--amber-soft);
    height: 6px;
    transition: background 0.2s ease;
  }
  .ring.playing ~ .waveform span{ background: var(--amber); }
  .ring.playing ~ .waveform span{ animation: bounce 1s ease-in-out infinite; }
  .waveform span:nth-child(1){ animation-delay: 0s; }
  .waveform span:nth-child(2){ animation-delay: 0.1s; }
  .waveform span:nth-child(3){ animation-delay: 0.2s; }
  .waveform span:nth-child(4){ animation-delay: 0.3s; }
  .waveform span:nth-child(5){ animation-delay: 0.4s; }
  .waveform span:nth-child(6){ animation-delay: 0.3s; }
  .waveform span:nth-child(7){ animation-delay: 0.2s; }
  .waveform span:nth-child(8){ animation-delay: 0.1s; }
  .waveform span:nth-child(9){ animation-delay: 0s; }

  @keyframes bounce{
    0%, 100% { height: 6px; }
    50% { height: 22px; }
  }

  .status{
    font-size: 0.8rem;
    color: var(--ink-dim);
    letter-spacing: 0.04em;
    min-height: 1.2em;
  }

  @media (prefers-reduced-motion: reduce){
    .ring .pulse, .waveform span{ animation: none !important; }
  }
</style>
</head>
<body>

  <div class="card">
    <span class="eyebrow">Eine kleine Nachricht</span>
    <h1>Hallo&nbsp;Welt</h1>
    <p class="sub">Tippe auf den Knopf und hör sie dir an.</p>

    <div class="player">
      <div class="ring" id="ring">
        <span class="pulse"></span>
        <span class="pulse"></span>
        <span class="pulse"></span>
        <button class="play" id="playBtn" aria-label="Nachricht abspielen">
          <svg class="icon-play" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
          <svg class="icon-pause" viewBox="0 0 24 24"><path d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>
        </button>
      </div>
      <div class="waveform" aria-hidden="true">
        <span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span>
      </div>
      <div class="status" id="status">Bereit zum Abspielen</div>
    </div>
  </div>

  <audio id="audio" src="/root/helloinge.mp3" preload="metadata"></audio>

  <script>
    const audio = document.getElementById('audio');
    const ring = document.getElementById('ring');
    const btn = document.getElementById('playBtn');
    const status = document.getElementById('status');

    btn.addEventListener('click', () => {
      if (audio.paused) {
        audio.play().catch(() => {
          status.textContent = 'Audio konnte nicht geladen werden';
        });
      } else {
        audio.pause();
      }
    });

    audio.addEventListener('play', () => {
      ring.classList.add('playing');
      status.textContent = 'Spielt ab …';
    });
    audio.addEventListener('pause', () => {
      ring.classList.remove('playing');
      status.textContent = 'Pausiert';
    });
    audio.addEventListener('ended', () => {
      ring.classList.remove('playing');
      status.textContent = 'Fertig — nochmal antippen';
    });
  </script>

</body>
</html>
